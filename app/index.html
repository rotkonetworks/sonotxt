<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonoTxt - Text to Speech</title>
  <meta name="description" content="Paste text, get audio. Free, instant, no signup.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Space Grotesk',sans-serif;
      background:#fff1f2;
      color:#27272a;
      min-height:100vh;
    }

    #shell{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:calc(100% - 32px);
      max-width:400px;
      background:#fff;
      border:2px solid #881337;
      box-shadow:0.25rem 0.25rem 0 0 #881337;
    }

    .shell-titlebar{
      background:#fff;
      border-bottom:2px solid #881337;
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .shell-icon{color:#e11d48;font-size:16px}
    .shell-title{flex:1;text-align:center;color:#881337}

    .shell-content{
      padding:24px 16px;
      text-align:center;
    }

    .shell-status{
      color:#e11d48;
      font-family:'Space Grotesk',sans-serif;
      font-weight:600;
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
      animation:blink 1.2s ease-in-out infinite;
    }

    .shell-bars{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:4px;
      height:32px;
      margin-top:16px;
    }

    .shell-bar{
      width:6px;
      border-radius:2px;
      background:#e11d48;
      animation:bar-pulse 0.5s ease-in-out infinite;
    }

    @keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}
    @keyframes bar-pulse{0%,100%{height:30%}50%{height:100%}}

    .shell-footer{
      padding:10px;
      text-align:center;
      border-top:1px solid #fecdd3;
      font-size:10px;
      color:#a1a1aa;
      letter-spacing:0.5px;
    }

    #root{display:none}
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="shell">
    <div class="shell-titlebar">
      <span class="shell-icon">♫</span>
      <span class="shell-title">SONOTXT</span>
    </div>

    <div class="shell-content">
      <div class="shell-status">LOADING...</div>
      <div class="shell-bars">
        <div class="shell-bar" style="animation-delay:0s"></div>
        <div class="shell-bar" style="animation-delay:0.08s"></div>
        <div class="shell-bar" style="animation-delay:0.16s"></div>
        <div class="shell-bar" style="animation-delay:0.24s"></div>
        <div class="shell-bar" style="animation-delay:0.32s"></div>
        <div class="shell-bar" style="animation-delay:0.4s"></div>
        <div class="shell-bar" style="animation-delay:0.48s"></div>
        <div class="shell-bar" style="animation-delay:0.56s"></div>
      </div>
    </div>

    <div class="shell-footer">ROTKO NETWORKS</div>
  </div>

  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
