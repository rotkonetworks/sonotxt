<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonoTxt - Text to Speech</title>
  <meta name="description" content="Paste text, get audio. Free, instant, no signup.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* Dark blue loading shell with pink accents */
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);
      color:#c9d1d9;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #shell{
      width:100%;
      max-width:400px;
      margin:16px;
      background:linear-gradient(180deg,#21262d 0%,#161b22 100%);
      border:1px solid;
      border-color:#30363d #0d1117 #0d1117 #30363d;
      box-shadow:inset 1px 1px 0 rgba(255,255,255,0.03),inset -1px -1px 0 rgba(0,0,0,0.3),0 8px 32px rgba(0,0,0,0.4);
    }

    .shell-titlebar{
      background:linear-gradient(180deg,#21262d 0%,#161b22 100%);
      border-bottom:1px solid #0d1117;
      padding:6px 10px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .shell-dots{display:flex;gap:3px}
    .shell-dot{width:10px;height:10px;border-radius:50%}
    .shell-dot.red{background:#ff5f57}
    .shell-dot.yellow{background:#ffcc00}
    .shell-dot.green{background:#00ff00}

    .shell-title{flex:1;text-align:center;color:#fff}
    .shell-icon{color:#ec4899}

    .shell-lcd{
      background:linear-gradient(180deg,#0d1117 0%,#010409 100%);
      border:1px solid;
      border-color:#010409 #21262d #21262d #010409;
      box-shadow:inset 0 0 15px rgba(0,0,0,0.5);
      margin:8px;
      padding:16px;
      text-align:center;
    }

    .shell-status{
      color:#ec4899;
      font-family:'Courier New',monospace;
      text-shadow:0 0 8px rgba(236,72,153,0.4);
      font-size:12px;
      animation:blink 1s ease-in-out infinite;
    }

    .shell-bars{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:3px;
      height:32px;
      margin-top:12px;
      opacity:0.6;
    }

    .shell-bar{
      width:8px;
      background:linear-gradient(180deg,#ec4899 0%,#be185d 50%,#9f1239 100%);
      animation:bar-pulse 0.5s ease-in-out infinite;
    }

    @keyframes blink{0%,100%{opacity:0.5}50%{opacity:1}}
    @keyframes bar-pulse{0%,100%{height:30%}50%{height:100%}}

    .shell-footer{
      padding:8px;
      text-align:center;
      border-top:1px solid #0d1117;
      font-size:10px;
      color:#8b949e;
    }

    #root{display:none}
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="shell">
    <div class="shell-titlebar">
      <div class="shell-dots">
        <div class="shell-dot red"></div>
        <div class="shell-dot yellow"></div>
        <div class="shell-dot green"></div>
      </div>
      <span class="shell-icon">♫</span>
      <span class="shell-title">SONOTXT</span>
      <span style="width:50px"></span>
    </div>

    <div class="shell-lcd">
      <div class="shell-status">LOADING...</div>
      <div class="shell-bars">
        <div class="shell-bar" style="animation-delay:0s"></div>
        <div class="shell-bar" style="animation-delay:0.1s"></div>
        <div class="shell-bar" style="animation-delay:0.2s"></div>
        <div class="shell-bar" style="animation-delay:0.3s"></div>
        <div class="shell-bar" style="animation-delay:0.4s"></div>
        <div class="shell-bar" style="animation-delay:0.5s"></div>
        <div class="shell-bar" style="animation-delay:0.6s"></div>
        <div class="shell-bar" style="animation-delay:0.7s"></div>
      </div>
    </div>

    <div class="shell-footer">ROTKO NETWORKS</div>
  </div>

  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
