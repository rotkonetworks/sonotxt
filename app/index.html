<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonoTxt - Text to Speech</title>
  <meta name="description" content="Paste text, get audio. Free, instant, no signup.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /* Critical CSS - inline for instant paint */
    :root{--bg:#0d1117;--surface:#161b22;--border:rgba(255,255,255,.1);--primary:#be185d;--muted:rgba(255,255,255,.5)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:#fff;min-height:100vh}

    /* Shell matches app layout exactly */
    #shell{display:flex;flex-direction:column;min-height:100vh}
    .shell-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
    .shell-logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600}
    .shell-logo svg{width:24px;height:24px}
    .shell-badge{font-size:12px;background:var(--surface);border:1px solid var(--border);padding:6px 12px;color:var(--muted)}

    .shell-main{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px;max-width:800px;margin:0 auto;width:100%}
    .shell-title{font-size:24px;font-weight:600;margin-bottom:32px;text-align:center}
    .shell-title span{color:var(--muted);font-weight:400}

    .shell-input-box{width:100%;background:var(--surface);border:1px solid var(--border)}
    .shell-textarea{width:100%;min-height:180px;padding:20px;background:transparent;border:none;color:#fff;font-size:16px;line-height:1.6;resize:none;font-family:inherit}
    .shell-textarea::placeholder{color:var(--muted)}
    .shell-textarea:focus{outline:none}
    .shell-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
    .shell-meta{font-size:13px;color:var(--muted)}
    .shell-btn{background:var(--primary);color:#fff;border:1px solid var(--primary);padding:12px 24px;font-size:15px;font-weight:500;opacity:.5;cursor:not-allowed}

    .shell-hint{margin-top:16px;font-size:14px;color:var(--muted);text-align:center}

    /* Pulse animation for loading state */
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
    .shell-textarea{animation:pulse 1.5s ease-in-out infinite}

    /* Root hidden until JS shows it */
    #root{display:none}
  </style>
</head>
<body>
  <!-- App mounts here -->
  <div id="root"></div>

  <!-- Instant shell - shows while app loads -->
  <div id="shell">
    <header class="shell-header">
      <div class="shell-logo">
        <svg viewBox="0 0 128 128">
          <rect width="128" height="128" fill="#be185d"/>
          <path d="M40 44h8v40h-8zM56 36h8v56h-8zM72 48h8v32h-8zM88 40h8v48h-8z" fill="#fff"/>
        </svg>
        SonoTxt
      </div>
      <span class="shell-badge">Free: 1000 chars/day</span>
    </header>

    <main class="shell-main">
      <h1 class="shell-title">Paste text, get audio <span>instantly</span></h1>

      <div class="shell-input-box">
        <textarea class="shell-textarea" placeholder="Paste or type your text here..." disabled></textarea>
        <div class="shell-footer">
          <span class="shell-meta">0 chars</span>
          <button class="shell-btn" disabled>Generate</button>
        </div>
      </div>

      <p class="shell-hint">Loading...</p>
    </main>
  </div>

  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
