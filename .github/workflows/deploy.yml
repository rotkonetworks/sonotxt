name: Deploy sonotxt

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # App (sonotxt.com + app.sonotxt.com) - Vite SPA
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build app
        run: |
          cd app
          pnpm install
          pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy app
        run: |
          # Upload built files
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy" app/dist/ deploy@www.rotko.net:/tmp/sonotxt-app/
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          # Deploy to sonotxt.com (port 8100) - landing redirect
          mkdir -p /srv/sonotxt/landing
          cp -r /tmp/sonotxt-app/* /srv/sonotxt/landing/

          podman stop sonotxt-landing 2>/dev/null || true
          podman rm sonotxt-landing 2>/dev/null || true
          podman run -d \
            --name sonotxt-landing \
            --restart=always \
            -p 127.0.0.1:8100:80 \
            -v /srv/sonotxt/landing:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          # Deploy to app.sonotxt.com (port 8101)
          mkdir -p /srv/sonotxt/dashboard
          cp -r /tmp/sonotxt-app/* /srv/sonotxt/dashboard/

          podman stop sonotxt-dashboard 2>/dev/null || true
          podman rm sonotxt-dashboard 2>/dev/null || true
          podman run -d \
            --name sonotxt-dashboard \
            --restart=always \
            -p 127.0.0.1:8101:80 \
            -v /srv/sonotxt/dashboard:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          sleep 2
          curl -sf http://127.0.0.1:8100/ > /dev/null && echo "sonotxt.com deploy OK"
          curl -sf http://127.0.0.1:8101/ > /dev/null && echo "app.sonotxt.com deploy OK"
          EOF

  # API server (api.sonotxt.com) - Rust binary
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock', 'hwpay/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config

      - name: Build API server
        env:
          SQLX_OFFLINE: "true"
        run: |
          cd rust
          cargo build --release
          strip target/release/sonotxt

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy API
        run: |
          scp -i ~/.ssh/id_deploy rust/target/release/sonotxt deploy@www.rotko.net:/tmp/sonotxt-api
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          # Stop existing
          sudo systemctl stop sonotxt-api 2>/dev/null || true

          # Install binary
          sudo mkdir -p /srv/sonotxt/api
          sudo mv /tmp/sonotxt-api /srv/sonotxt/api/sonotxt
          sudo chmod +x /srv/sonotxt/api/sonotxt

          # Write systemd service (always update)
          sudo tee /etc/systemd/system/sonotxt-api.service > /dev/null <<'SERVICE'
          [Unit]
          Description=sonotxt API Server
          After=network.target postgresql.service redis.service
          Wants=postgresql.service redis.service

          [Service]
          Type=simple
          User=sonotxt
          WorkingDirectory=/srv/sonotxt/api
          ExecStart=/srv/sonotxt/api/sonotxt
          Restart=always
          RestartSec=5

          # Secrets from env file (STRIPE_SECRET_KEY, VAULT_PASSWORD, DEPOSIT_WALLET_SEED, etc.)
          EnvironmentFile=-/srv/sonotxt/api/.env

          # Non-secret defaults
          Environment=RUST_LOG=info
          Environment=DATABASE_URL=postgres://sonotxt:sonotxt@localhost/sonotxt
          Environment=SERVER_HOST=127.0.0.1
          Environment=SERVER_PORT=8102
          Environment=APP_URL=https://app.sonotxt.com
          Environment=AUDIO_PUBLIC_URL=https://audio.sonotxt.com/sonotxt-audio
          Environment=MINIO_ENDPOINT=http://localhost:9000
          Environment=S3_BUCKET=sonotxt-audio
          Environment=ASSETHUB_RPC=wss://polkadot-asset-hub-rpc.polkadot.io
          Environment=ASSETHUB_LISTENER_ENABLED=true

          [Install]
          WantedBy=multi-user.target
          SERVICE
          sudo systemctl daemon-reload
          sudo systemctl enable sonotxt-api

          # Start
          sudo systemctl start sonotxt-api
          sleep 2
          curl -sf http://127.0.0.1:8102/api/voices > /dev/null && echo "API deploy OK"
          EOF

  # CDN (cdn.sonotxt.com) - embed.js + static files
  deploy-cdn:
    needs: deploy-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare CDN files
        run: |
          mkdir -p cdn
          cp app/public/embed.js cdn/embed.js

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy CDN
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy" cdn/ deploy@www.rotko.net:/tmp/sonotxt-cdn/
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          mkdir -p /srv/sonotxt/cdn
          cp -r /tmp/sonotxt-cdn/* /srv/sonotxt/cdn/

          podman stop sonotxt-cdn 2>/dev/null || true
          podman rm sonotxt-cdn 2>/dev/null || true

          # Run on port 8103 (haproxy routes cdn.sonotxt.com -> 127.0.0.1:8103)
          podman run -d \
            --name sonotxt-cdn \
            --restart=always \
            -p 127.0.0.1:8103:80 \
            -v /srv/sonotxt/cdn:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          sleep 2
          curl -sf http://127.0.0.1:8103/embed.js > /dev/null && echo "CDN deploy OK"
          EOF
