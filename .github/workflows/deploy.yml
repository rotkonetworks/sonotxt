name: Deploy sonotxt

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # App (sonotxt.com + app.sonotxt.com) - Vite SPA
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Build app
        run: |
          cd app
          pnpm install
          pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy app
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy" app/dist/ deploy@www.rotko.net:/tmp/sonotxt-app/
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          mkdir -p ~/sonotxt/landing ~/sonotxt/dashboard
          rsync -a --delete /tmp/sonotxt-app/ ~/sonotxt/landing/
          rsync -a --delete /tmp/sonotxt-app/ ~/sonotxt/dashboard/

          podman stop sonotxt-landing 2>/dev/null || true
          podman rm sonotxt-landing 2>/dev/null || true
          podman run -d \
            --name sonotxt-landing \
            --restart=always \
            -p 127.0.0.1:8100:80 \
            -v ~/sonotxt/landing:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          podman stop sonotxt-dashboard 2>/dev/null || true
          podman rm sonotxt-dashboard 2>/dev/null || true
          podman run -d \
            --name sonotxt-dashboard \
            --restart=always \
            -p 127.0.0.1:8101:80 \
            -v ~/sonotxt/dashboard:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          sleep 2
          curl -sf http://127.0.0.1:8100/ > /dev/null && echo "sonotxt.com deploy OK"
          curl -sf http://127.0.0.1:8101/ > /dev/null && echo "app.sonotxt.com deploy OK"
          EOF

  # API server (api.sonotxt.com) - Rust binary
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock', 'hwpay/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config

      - name: Build API server
        env:
          SQLX_OFFLINE: "true"
        run: |
          cd rust
          cargo build --release
          strip target/release/sonotxt

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy API
        run: |
          scp -i ~/.ssh/id_deploy rust/target/release/sonotxt deploy@www.rotko.net:/tmp/sonotxt-api
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          mkdir -p ~/sonotxt/api

          # Stop existing process
          if [ -f ~/sonotxt/api/sonotxt.pid ]; then
            kill "$(cat ~/sonotxt/api/sonotxt.pid)" 2>/dev/null || true
            sleep 1
          fi

          # Install binary
          mv /tmp/sonotxt-api ~/sonotxt/api/sonotxt
          chmod +x ~/sonotxt/api/sonotxt

          # Write env defaults (secrets in .env override these)
          cat > ~/sonotxt/api/env.defaults <<'ENVFILE'
          RUST_LOG=info
          DATABASE_URL=postgres://sonotxt:sonotxt@localhost/sonotxt
          SERVER_HOST=127.0.0.1
          SERVER_PORT=8102
          APP_URL=https://app.sonotxt.com
          AUDIO_PUBLIC_URL=https://audio.sonotxt.com/sonotxt-audio
          MINIO_ENDPOINT=http://localhost:9000
          S3_BUCKET=sonotxt-audio
          ASSETHUB_RPC=wss://polkadot-asset-hub-rpc.polkadot.io
          ASSETHUB_LISTENER_ENABLED=true
          ENVFILE

          # Start API in background
          cd ~/sonotxt/api
          set -a
          . ./env.defaults
          [ -f .env ] && . .env
          set +a
          nohup ./sonotxt > api.log 2>&1 &
          echo $! > sonotxt.pid

          sleep 2
          curl -sf http://127.0.0.1:8102/api/voices > /dev/null && echo "API deploy OK"
          EOF

  # CDN (cdn.sonotxt.com) - embed.js + static files
  deploy-cdn:
    needs: deploy-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare CDN files
        run: |
          mkdir -p cdn
          cp app/public/embed.js cdn/embed.js

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H www.rotko.net >> ~/.ssh/known_hosts

      - name: Deploy CDN
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy" cdn/ deploy@www.rotko.net:/tmp/sonotxt-cdn/
          ssh -i ~/.ssh/id_deploy deploy@www.rotko.net bash -s <<'EOF'
          set -e

          mkdir -p ~/sonotxt/cdn
          rsync -a --delete /tmp/sonotxt-cdn/ ~/sonotxt/cdn/

          podman stop sonotxt-cdn 2>/dev/null || true
          podman rm sonotxt-cdn 2>/dev/null || true

          # Run on port 8103 (haproxy routes cdn.sonotxt.com -> 127.0.0.1:8103)
          podman run -d \
            --name sonotxt-cdn \
            --restart=always \
            -p 127.0.0.1:8103:80 \
            -v ~/sonotxt/cdn:/usr/share/nginx/html:ro \
            docker.io/library/nginx:alpine

          sleep 2
          curl -sf http://127.0.0.1:8103/embed.js > /dev/null && echo "CDN deploy OK"
          EOF
