# SonoTxt HAProxy configuration snippet
# Add to your haproxy.cfg frontend and backend sections
#
# Requires HAProxy 2.6+ for QUIC support

# === Add to global section ===
# global
#     # QUIC support (optional, requires HAProxy 2.6+)
#     ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256


# === Add to frontend (after existing ACLs) ===

# SonoTxt domains
acl host_sonotxt hdr(host) -i sonotxt.com www.sonotxt.com
acl host_sonotxt_api hdr(host) -i api.sonotxt.com
acl host_sonotxt_app hdr(host) -i app.sonotxt.com
acl host_sonotxt_cdn hdr(host) -i cdn.sonotxt.com
acl host_sonotxt_audio hdr(host) -i audio.sonotxt.com

use_backend sonotxt_landing if host_sonotxt
use_backend sonotxt_api if host_sonotxt_api
use_backend sonotxt_dashboard if host_sonotxt_app
use_backend sonotxt_cdn if host_sonotxt_cdn
use_backend sonotxt_audio if host_sonotxt_audio


# === Add to backends section ===

backend sonotxt_landing
    server landing 127.0.0.1:8100 check

backend sonotxt_api
    # WebSocket support for job status
    option http-server-close
    timeout tunnel 1h
    # Enable CORS headers for API
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Authorization, Content-Type"
    server api 127.0.0.1:8102 check

backend sonotxt_dashboard
    server dashboard 127.0.0.1:8101 check

backend sonotxt_cdn
    # Long cache for static assets
    http-response set-header Cache-Control "public, max-age=86400"
    http-response set-header Access-Control-Allow-Origin "*"
    server cdn 127.0.0.1:8103 check

backend sonotxt_audio
    # Audio streaming with byte-range support
    # MinIO already supports Range requests natively

    # CORS for cross-origin audio playback
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Range"
    http-response set-header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges"

    # Ensure byte-range headers are preserved
    http-response set-header Accept-Ranges "bytes"

    # Caching - audio files are immutable
    http-response set-header Cache-Control "public, max-age=31536000, immutable"

    # Content type for audio files
    http-response set-header Content-Type "audio/ogg" if { path_end .ogg }
    http-response set-header Content-Type "audio/mpeg" if { path_end .mp3 }

    server minio 127.0.0.1:9000 check


# === Port mapping summary ===
# sonotxt.com       -> 127.0.0.1:8100 (landing - redbean)
# app.sonotxt.com   -> 127.0.0.1:8101 (dashboard - redbean)
# api.sonotxt.com   -> 127.0.0.1:8102 (rust api server)
# cdn.sonotxt.com   -> 127.0.0.1:8103 (embed.js - redbean)
# audio.sonotxt.com -> 127.0.0.1:9000 (minio - audio storage)


# === QUIC Frontend (optional, HAProxy 2.6+) ===
# Uncomment to enable HTTP/3 with QUIC for audio streaming
#
