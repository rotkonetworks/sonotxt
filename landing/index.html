<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonoTxt - Text to Speech</title>
  <meta name="description" content="Paste text, get audio. Free, instant, no signup.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --text-muted: rgba(255,255,255,0.5);
      --primary: #6c5ce7;
      --primary-hover: #5b4cdb;
      --success: #2ecc71;
      --error: #e74c3c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header - minimal */
    header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .logo svg { width: 24px; height: 24px; }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-actions a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .header-actions a:hover { color: var(--text); background: var(--surface); }

    .user-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      text-align: center;
    }

    h1 span { color: var(--text-muted); font-weight: 400; }

    /* Input area */
    .input-container {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 20px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { outline: none; }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    .input-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .char-count { font-variant-numeric: tabular-nums; }
    .char-count.warn { color: #f39c12; }
    .char-count.over { color: var(--error); }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: var(--primary); }

    .generate-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .generate-btn:hover { background: var(--primary-hover); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .generate-btn svg { width: 18px; height: 18px; }

    /* Drop zone */
    .drop-hint {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .input-container.dragover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.05);
    }

    /* Status / Player */
    .status-area {
      width: 100%;
      margin-top: 8px;
    }

    .status-msg {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-msg.processing {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .status-msg.error {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Audio player */
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      width: 100%;
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .player-title {
      font-size: 14px;
      color: var(--text-muted);
    }

    .player-actions {
      display: flex;
      gap: 8px;
    }

    .player-actions a {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .player-actions a:hover { background: rgba(108, 92, 231, 0.1); }

    audio { width: 100%; height: 40px; }

    /* History section */
    .history-section {
      width: 100%;
      margin-top: 48px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-item:hover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.05);
    }

    .history-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 16px;
    }

    .history-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .history-empty {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      width: 100%;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Footer */
    footer {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* Responsive */
    @media (max-width: 600px) {
      main { padding: 32px 16px; }
      h1 { font-size: 22px; }
      .input-footer { flex-direction: column; gap: 12px; }
      .generate-btn { width: 100%; justify-content: center; }
      .stats-bar { flex-wrap: wrap; gap: 16px; }
      .stat { flex: 1; min-width: 80px; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <svg viewBox="0 0 128 128">
        <rect width="128" height="128" rx="24" fill="#6c5ce7"/>
        <path d="M40 44h8v40h-8zM56 36h8v56h-8zM72 48h8v32h-8zM88 40h8v48h-8z" fill="#fff"/>
      </svg>
      SonoTxt
    </a>
    <div class="header-actions">
      <a href="#" id="loginBtn">Login</a>
      <span class="user-badge" id="userBadge">Free: 1000 chars/day</span>
    </div>
  </header>

  <main>
    <h1>Paste text, get audio <span>instantly</span></h1>

    <div class="input-container" id="inputContainer">
      <textarea id="textInput" placeholder="Paste or type your text here... or drop a .txt file"></textarea>
      <div class="input-footer">
        <div class="input-meta">
          <span class="char-count" id="charCount">0 chars</span>
          <select id="voiceSelect">
            <option value="af_bella">Bella (US)</option>
            <option value="af_nicole">Nicole (US)</option>
            <option value="am_adam">Adam (US)</option>
            <option value="am_michael">Michael (US)</option>
            <option value="bf_emma">Emma (UK)</option>
            <option value="bm_george">George (UK)</option>
          </select>
        </div>
        <button class="generate-btn" id="generateBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
          Generate
        </button>
      </div>
    </div>

    <div class="drop-hint">Drop a .txt or .pdf file, or paste from clipboard</div>

    <div class="status-area" id="statusArea"></div>

    <div class="history-section" id="historySection">
      <div class="section-header">
        <h2>Recent</h2>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No audio generated yet</div>
      </div>
    </div>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="stat-value" id="statGenerated">0</div>
        <div class="stat-label">Generated</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statChars">0</div>
        <div class="stat-label">Characters</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statRemaining">1000</div>
        <div class="stat-label">Free today</div>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://rotko.net">Rotko Networks</a> ·
    <a href="/extension">Browser Extension</a> ·
    <a href="/embed">Embed Widget</a>
  </footer>

  <script>
    const API_BASE = 'https://api.sonotxt.com';

    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const voiceSelect = document.getElementById('voiceSelect');
    const generateBtn = document.getElementById('generateBtn');
    const statusArea = document.getElementById('statusArea');
    const inputContainer = document.getElementById('inputContainer');
    const historyList = document.getElementById('historyList');
    const statGenerated = document.getElementById('statGenerated');
    const statChars = document.getElementById('statChars');
    const statRemaining = document.getElementById('statRemaining');

    // Load history from localStorage
    let history = JSON.parse(localStorage.getItem('sonotxt_history') || '[]');
    let stats = JSON.parse(localStorage.getItem('sonotxt_stats') || '{"generated":0,"chars":0}');

    // Update char count
    textInput.addEventListener('input', updateCharCount);

    function updateCharCount() {
      const len = textInput.value.length;
      charCount.textContent = `${len.toLocaleString()} chars`;
      charCount.className = 'char-count';
      if (len > 800) charCount.classList.add('warn');
      if (len > 1000) charCount.classList.add('over');
    }

    // Drag and drop
    inputContainer.addEventListener('dragover', (e) => {
      e.preventDefault();
      inputContainer.classList.add('dragover');
    });

    inputContainer.addEventListener('dragleave', () => {
      inputContainer.classList.remove('dragover');
    });

    inputContainer.addEventListener('drop', async (e) => {
      e.preventDefault();
      inputContainer.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (file) {
        if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
          textInput.value = await file.text();
          updateCharCount();
        } else if (file.type === 'application/pdf') {
          showStatus('PDF support coming soon', 'error');
        }
      }
    });

    // Generate audio
    generateBtn.addEventListener('click', generate);

    async function generate() {
      const text = textInput.value.trim();
      if (!text) return;

      if (text.length > 1000) {
        showStatus('Free tier limited to 1000 chars. Login for more!', 'error');
        return;
      }

      generateBtn.disabled = true;
      showStatus('Generating...', 'processing');

      try {
        const res = await fetch(`${API_BASE}/tts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voice: voiceSelect.value })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Request failed');
        }

        const { job_id, free_tier_remaining } = await res.json();
        if (free_tier_remaining !== undefined) {
          statRemaining.textContent = free_tier_remaining.toLocaleString();
        }

        // Poll for completion
        const audio = await pollJob(job_id);
        showPlayer(audio.url, audio.duration_seconds, text);

        // Update history & stats
        addToHistory(text, audio.url, audio.duration_seconds);
        stats.generated++;
        stats.chars += text.length;
        localStorage.setItem('sonotxt_stats', JSON.stringify(stats));
        updateStats();

      } catch (e) {
        showStatus(e.message, 'error');
      }

      generateBtn.disabled = false;
    }

    async function pollJob(jobId) {
      for (let i = 0; i < 60; i++) {
        await sleep(1000);
        const res = await fetch(`${API_BASE}/status?job_id=${jobId}`);
        const status = await res.json();

        if (status.status === 'Complete') {
          return status;
        } else if (status.status === 'Failed') {
          throw new Error(status.reason || 'Generation failed');
        }

        showStatus(`${status.status}...`, 'processing');
      }
      throw new Error('Timeout');
    }

    function showStatus(msg, type) {
      if (type === 'processing') {
        statusArea.innerHTML = `
          <div class="status-msg processing">
            <div class="spinner"></div>
            <span>${msg}</span>
          </div>
        `;
      } else if (type === 'error') {
        statusArea.innerHTML = `
          <div class="status-msg error">${msg}</div>
        `;
        setTimeout(() => statusArea.innerHTML = '', 5000);
      }
    }

    function showPlayer(url, duration, text) {
      statusArea.innerHTML = `
        <div class="player-card">
          <div class="player-header">
            <span class="player-title">${Math.round(duration)}s · ${text.length.toLocaleString()} chars</span>
            <div class="player-actions">
              <a href="${url}" download="audio.mp3">Download</a>
            </div>
          </div>
          <audio controls autoplay src="${url}"></audio>
        </div>
      `;
    }

    function addToHistory(text, url, duration) {
      const item = {
        text: text.slice(0, 100),
        url,
        duration,
        date: new Date().toISOString()
      };

      history.unshift(item);
      if (history.length > 10) history.pop();
      localStorage.setItem('sonotxt_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = '<div class="history-empty">No audio generated yet</div>';
        return;
      }

      historyList.innerHTML = history.map((item, i) => `
        <div class="history-item" onclick="playHistoryItem(${i})">
          <span class="history-text">${escapeHtml(item.text)}</span>
          <div class="history-meta">
            <span>${Math.round(item.duration)}s</span>
            <span>${formatDate(item.date)}</span>
          </div>
        </div>
      `).join('');
    }

    function playHistoryItem(index) {
      const item = history[index];
      showPlayer(item.url, item.duration, item.text);
    }

    function updateStats() {
      statGenerated.textContent = stats.generated.toLocaleString();
      statChars.textContent = stats.chars.toLocaleString();
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;

      if (diff < 60000) return 'just now';
      if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
      return d.toLocaleDateString();
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // Init
    renderHistory();
    updateStats();
  </script>
</body>
</html>
