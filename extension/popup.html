<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 28px;
      height: 28px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .status-badge {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.free {
      background: rgba(108, 92, 231, 0.2);
      color: #a29bfe;
    }

    .main-action {
      width: 100%;
      padding: 14px;
      background: #6c5ce7;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .main-action:hover {
      background: #5b4cdb;
    }

    .main-action:active {
      transform: scale(0.98);
    }

    .main-action:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .main-action svg {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .settings {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .setting-row label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      min-width: 50px;
    }

    select {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #6c5ce7;
    }

    select option {
      background: #1a1a2e;
      color: #fff;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
    }

    input[type="password"] {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
    }

    input:focus {
      outline: none;
      border-color: #6c5ce7;
    }

    .save-btn {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .save-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .shortcuts {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;
    }

    .shortcuts kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      color: rgba(255, 255, 255, 0.7);
    }

    .status-msg {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 12px;
    }

    .status-msg.success {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }

    .status-msg.error {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    .hidden {
      display: none !important;
    }

    .balance-display {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      margin-top: 10px;
    }

    .balance-display strong {
      color: #6c5ce7;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="logo" alt="">
    <span class="title">sonotxt</span>
    <span id="statusBadge" class="status-badge free">Free</span>
  </div>

  <div id="statusMsg" class="status-msg hidden"></div>

  <button id="listenPage" class="main-action">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    Listen to this page
  </button>

  <div id="balanceDisplay" class="balance-display hidden"></div>

  <div class="divider">settings</div>

  <div class="settings">
    <div class="setting-row" id="voiceRow">
      <label>Voice</label>
      <select id="voice">
        <option value="af_bella">Bella</option>
      </select>
    </div>

    <div class="setting-row">
      <label>API Key</label>
      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="Optional">
        <button id="saveKey" class="save-btn">Save</button>
      </div>
    </div>
  </div>

  <div class="shortcuts">
    <kbd>Alt+S</kbd> Listen to selection<br>
    <kbd>Alt+X</kbd> Stop playback
  </div>

  <script src="popup.js"></script>
</body>
</html>
